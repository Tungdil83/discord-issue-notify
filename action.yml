name: "Notify Discord on new Issue"
description: "Send a Discord webhook notification when a new GitHub Issue is opened"
author: "Tungdil83"
inputs:
  webhook_url:
    description: "Discord webhook URL"
    required: true
  mention_users:
    description: "Comma-separated Discord user IDs to mention"
    required: false
    default: ""
  mention_roles:
    description: "Comma-separated Discord role IDs to mention"
    required: false
    default: ""
runs:
  using: "node20"
  main: "src/index.js"

branding:
  icon: rss
  color: green